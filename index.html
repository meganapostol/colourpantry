<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAF7F2" />
    <meta name="description" content="Colour Pantry — every hex code in cubes. A free, no-account color reference and palette tool with the most comprehensive skin tone library online." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('colour-pantry-theme');
          if (saved === 'dark') document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
    <title>Colour Pantry</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
